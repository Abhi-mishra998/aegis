server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Block all dot-files and dot-directories (.env, .git, .htaccess, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # SSE endpoint — must come BEFORE the general API proxy block.
    # EventSource connections are long-lived; the general 60s read timeout
    # would kill them every minute causing a reconnect storm.
    # proxy_buffering off is required so events reach the browser immediately
    # instead of being held in nginx's write buffer.
    location = /events/stream {
        proxy_pass http://gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Strip the Connection hop-by-hop header so nginx doesn't close the
        # upstream TCP connection when the browser sends Connection: keep-alive.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;   # 1 hour; backend heartbeats every 15s
        proxy_connect_timeout 10s;
    }

    # Reverse-proxy backend API routes to the gateway service.
    # Allows VITE_GATEWAY_URL="" (relative URLs) inside Docker so the browser
    # never needs to know the internal gateway hostname or port.
    # Bare-prefix matches go to the gateway (UI hits both `/agents` and
    # `/agents/<id>`, for instance, so we cannot require a trailing slash).
    # The three additions below — receipts/transparency/dashboard — are
    # API-only namespaces with no bare-path UI route, so we anchor them to
    # `<name>/` to keep React-Router redirects like `/dashboard` → SPA-side.
    # Bare names match a path that is *exactly* the name or followed by `/` or `?`.
    # This stops `/policy-builder`, `/risk-engine`, `/audit-trail` etc. (React-Router
    # SPA routes) from being swallowed by `^/(policy|risk|audit|...)`.
    #
    # Many of these names are ALSO React-Router SPA routes (e.g. `/agents`,
    # `/forensics`, `/incidents`, `/autonomy`, `/auto-response`). For those, a
    # *browser navigation* (sends `Accept: text/html…`) must serve the SPA shell,
    # while a *fetch from already-loaded SPA JS* (sends `Accept: */*` or
    # `application/json`) must hit the gateway. We distinguish by Accept header.
    set $use_spa 0;
    # Browser navigation sends `Accept: text/html…` — that's how we tell apart a
    # full-page nav from a JS fetch/XHR. fetch() defaults to `Accept: */*`. We
    # cannot use the Authorization header because the browser cookie auth (acp_token)
    # is also present on JS fetches.
    if ($http_accept ~* "text/html") { set $use_spa 1; }
    # `Sec-Fetch-Mode: navigate` is a stronger signal — modern browsers set it on
    # top-bar URL/back-button/anchor navigations but NEVER on fetch/XHR. We treat
    # navigate as authoritative SPA-shell-required even if Accept is missing.
    if ($http_sec_fetch_mode = "cors")          { set $use_spa 0; }
    if ($http_sec_fetch_mode = "same-origin")   { set $use_spa 0; }
    if ($http_sec_fetch_mode = "navigate")      { set $use_spa 1; }

    location ~ ^/(auth|agents|audit|risk|decision|forensics|billing|api-keys|insights|health|status|simulate|execute|usage|incidents|auto-response|events|stream|system|policy|logs|graph|flight|autonomy|metrics|notifications|playbooks|users|admin|registry)(/|\?|$) {
        if ($use_spa) {
            rewrite ^.*$ /index.html last;
        }
        proxy_pass http://gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Strict-prefix API namespaces — these have no bare-path SPA route, so we
    # proxy `/<name>/...` only and let any other path fall through to the SPA.
    location ~ ^/(tenant|receipts|transparency|dashboard|compliance|reports|security|siem|threat-intel|webhooks)/ {
        proxy_pass http://gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Lightweight health endpoint for ALB and Docker healthcheck
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
