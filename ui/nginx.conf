server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Block all dot-files and dot-directories (.env, .git, .htaccess, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # SSE endpoint — must come BEFORE the general API proxy block.
    # EventSource connections are long-lived; the general 60s read timeout
    # would kill them every minute causing a reconnect storm.
    # proxy_buffering off is required so events reach the browser immediately
    # instead of being held in nginx's write buffer.
    location = /events/stream {
        proxy_pass http://gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Strip the Connection hop-by-hop header so nginx doesn't close the
        # upstream TCP connection when the browser sends Connection: keep-alive.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;   # 1 hour; backend heartbeats every 15s
        proxy_connect_timeout 10s;
    }

    # Reverse-proxy backend API routes to the gateway service.
    # Allows VITE_GATEWAY_URL="" (relative URLs) inside Docker so the browser
    # never needs to know the internal gateway hostname or port.
    # Bare-prefix matches go to the gateway (UI hits both `/agents` and
    # `/agents/<id>`, for instance, so we cannot require a trailing slash).
    # The three additions below — receipts/transparency/dashboard — are
    # API-only namespaces with no bare-path UI route, so we anchor them to
    # `<name>/` to keep React-Router redirects like `/dashboard` → SPA-side.
    location ~ ^/(auth|agents|audit|risk|decision|forensics|billing|api-keys|insights|health|status|simulate|execute|usage|incidents|auto-response|events|stream|system|policy|logs|graph|flight|autonomy|metrics|tenant/|receipts/|transparency/|dashboard/|notifications|compliance/|playbooks|reports/|security/|siem/|threat-intel/|users|webhooks/|admin/) {
        proxy_pass http://gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Lightweight health endpoint for ALB and Docker healthcheck
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
