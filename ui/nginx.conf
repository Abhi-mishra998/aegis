server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cross-Origin-Opener-Policy: keep our window detached from Clerk's
    # OAuth popup so a compromised popup can't reach back into the SPA via
    # window.opener. `allow-popups` is required because Clerk uses a popup
    # for Google/MS SSO; a strict `same-origin` would break sign-in.
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    # Cross-Origin-Resource-Policy: third-parties cannot embed our JSON /
    # asset bytes into their pages. Same-site so Stripe + Clerk subdomains
    # still work.
    add_header Cross-Origin-Resource-Policy "same-site" always;

    # HSTS: one-year max-age, applies to subdomains, eligible for the
    # browser preload list. `preload` is what the Lighthouse "use a strong
    # HSTS policy" audit requires.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # Permissions-Policy: disable browser capabilities Aegis never asks for.
    # Voice-agent surface uses microphone permissions only inside the
    # /voice subapp; future expansion can scope this per location.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self), usb=()" always;
    # CSP: the SPA hits Clerk + Stripe + first-party. 'unsafe-inline' on
    # script-src + style-src is unavoidable for Vite's bootstrap shim and
    # the Tailwind utility styles; nonces would require build changes
    # that aren't part of Sprint 10 scope.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.clerk.accounts.dev https://*.clerk.com https://challenges.cloudflare.com https://js.stripe.com https://m.stripe.network; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://*.clerk.accounts.dev https://*.clerk.com https://api.clerk.com https://challenges.cloudflare.com https://api.stripe.com https://m.stripe.network; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; frame-src https://*.clerk.accounts.dev https://*.clerk.com https://challenges.cloudflare.com https://js.stripe.com https://hooks.stripe.com; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # M4 closure 2026-06-18: serve /.well-known/* (RFC 5785) — needed for
    # /.well-known/security.txt (RFC 9116) responsible-disclosure contact.
    # MUST come BEFORE the dot-file deny block below.
    location ^~ /.well-known/ {
        try_files $uri =404;
        default_type text/plain;
    }

    # M4 closure: also serve /security.txt at the legacy (non-.well-known)
    # path that some scanners still check first.
    location = /security.txt {
        try_files /.well-known/security.txt =404;
        default_type text/plain;
    }

    # M5 closure 2026-06-18: don't leak nginx version in Server: header.
    server_tokens off;

    # Block all dot-files and dot-directories (.env, .git, .htaccess, etc.)
    # — but NOT /.well-known/ (handled above).
    location ~ /\. {
        deny all;
        return 404;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # SSE endpoint — must come BEFORE the general API proxy block.
    # EventSource connections are long-lived; the general 60s read timeout
    # would kill them every minute causing a reconnect storm.
    # proxy_buffering off is required so events reach the browser immediately
    # instead of being held in nginx's write buffer.
    location = /events/stream {
        proxy_pass http://gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Strip the Connection hop-by-hop header so nginx doesn't close the
        # upstream TCP connection when the browser sends Connection: keep-alive.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;   # 1 hour; backend heartbeats every 15s
        proxy_connect_timeout 10s;
    }

    # Reverse-proxy backend API routes to the gateway service.
    # Allows VITE_GATEWAY_URL="" (relative URLs) inside Docker so the browser
    # never needs to know the internal gateway hostname or port.
    # Bare-prefix matches go to the gateway (UI hits both `/agents` and
    # `/agents/<id>`, for instance, so we cannot require a trailing slash).
    # The three additions below — receipts/transparency/dashboard — are
    # API-only namespaces with no bare-path UI route, so we anchor them to
    # `<name>/` to keep React-Router redirects like `/dashboard` → SPA-side.
    # Bare names match a path that is *exactly* the name or followed by `/` or `?`.
    # This stops `/policy-builder`, `/risk-engine`, `/audit-trail` etc. (React-Router
    # SPA routes) from being swallowed by `^/(policy|risk|audit|...)`.
    #
    # Many of these names are ALSO React-Router SPA routes (e.g. `/agents`,
    # `/forensics`, `/incidents`, `/autonomy`, `/auto-response`). For those, a
    # *browser navigation* (sends `Accept: text/html…`) must serve the SPA shell,
    # while a *fetch from already-loaded SPA JS* (sends `Accept: */*` or
    # `application/json`) must hit the gateway. We distinguish by Accept header.
    set $use_spa 0;
    # Browser navigation sends `Accept: text/html…` — that's how we tell apart a
    # full-page nav from a JS fetch/XHR. fetch() defaults to `Accept: */*`. We
    # cannot use the Authorization header because the browser cookie auth (acp_token)
    # is also present on JS fetches.
    if ($http_accept ~* "text/html") { set $use_spa 1; }
    # `Sec-Fetch-Mode: navigate` is a stronger signal — modern browsers set it on
    # top-bar URL/back-button/anchor navigations but NEVER on fetch/XHR. We treat
    # navigate as authoritative SPA-shell-required even if Accept is missing.
    if ($http_sec_fetch_mode = "cors")          { set $use_spa 0; }
    if ($http_sec_fetch_mode = "same-origin")   { set $use_spa 0; }
    if ($http_sec_fetch_mode = "navigate")      { set $use_spa 1; }

    # OpenAPI spec — must be JSON, not the SPA fallback.
    location = /openapi.json {
        proxy_pass http://gateway:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=300";
    }
    location = /docs {
        proxy_pass http://gateway:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /redoc {
        proxy_pass http://gateway:8000/redoc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Sprint 17 — `team` (per-employee Claude usage UI surface) and `v1`
    # (Anthropic-compatible /v1/messages proxy) added. /v1/* MUST be in
    # this list — the regex's "(/|\?|$)" anchor means `/v1/messages` is
    # matched but the bare `/v1` is not, which is intentional. Without
    # the entry nginx returned 405 because the location / fallback only
    # handles GET-shaped SPA navigation.
    location ~ ^/(auth|agents|audit|risk|decision|forensics|billing|api-keys|insights|health|status|simulate|execute|usage|incidents|auto-response|events|stream|system|policy|policy-packs|logs|graph|flight|autonomy|metrics|notifications|playbooks|users|admin|registry|voice|demo|workspace|storylines|iag|remediation|threat-intel|team|v1|slack)(/|\?|$) {
        if ($use_spa) {
            rewrite ^.*$ /index.html last;
        }
        proxy_pass http://gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        # Tell the browser cache the response varies by Accept + Sec-Fetch-Mode:
        # the same URL returns HTML for top-bar navigations (Accept: text/html)
        # and JSON for SPA fetches (Accept: */*). Without Vary, the cached HTML
        # leaks into the next XHR and JSON.parse blows up with
        # "Unexpected token '<', '<!doctype'".
        add_header Vary "Accept, Sec-Fetch-Mode" always;
        add_header Cache-Control "no-store" always;
    }

    # Strict-prefix API namespaces — these have no bare-path SPA route, so we
    # proxy `/<name>/...` only and let any other path fall through to the SPA.
    location ~ ^/(tenant|receipts|transparency|dashboard|compliance|reports|security|siem|threat-intel|webhooks|approvals|replay)/ {
        proxy_pass http://gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # SPA fallback.
    # Vary on Accept+Sec-Fetch-Mode is critical here because the API block above
    # rewrites navigation hits to /index.html and falls through here. Without
    # Vary, the browser caches the HTML under the API path (e.g. /agents) and
    # serves it back for the subsequent JSON fetch.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Vary "Accept, Sec-Fetch-Mode" always;
        add_header Cache-Control "no-store" always;
        # Sprint 10 — Repeat the security headers here because nginx does
        # NOT inherit add_header directives from outer blocks once an
        # inner location adds even one header of its own.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self), usb=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.clerk.accounts.dev https://*.clerk.com https://challenges.cloudflare.com https://js.stripe.com https://m.stripe.network; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://*.clerk.accounts.dev https://*.clerk.com https://api.clerk.com https://challenges.cloudflare.com https://api.stripe.com https://m.stripe.network; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; frame-src https://*.clerk.accounts.dev https://*.clerk.com https://challenges.cloudflare.com https://js.stripe.com https://hooks.stripe.com; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Sprint 10 — Hardening headers MUST be repeated here, see the
        # comment in `location /` above for the inheritance gotcha.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
    }

    # AEVF (Aegis Evidence Verification Format) open spec + reference bundle.
    # Auditors curl /aevf/spec.md, /aevf/auditor-checklist.md, and
    # /aevf/reference-bundle-2026-06.json directly. Markdown gets text/plain so
    # the browser doesn't try to download; JSON keeps application/json so
    # `aegis-verify --bundle <file>` can parse it.
    location ~ ^/aevf/.+\.md$ {
        types { } default_type "text/plain; charset=utf-8";
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300";
        add_header Access-Control-Allow-Origin "*";
    }
    location ~ ^/aevf/.+\.json$ {
        types { } default_type "application/json; charset=utf-8";
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300";
        add_header Access-Control-Allow-Origin "*";
    }
    location ~ ^/aevf/?$ {
        types { } default_type "text/html; charset=utf-8";
        try_files /aevf/index.html =404;
        add_header Cache-Control "public, max-age=300";
        add_header Access-Control-Allow-Origin "*";
    }

    # U13 — ALB health probe MUST hit gateway, not a static nginx 200.
    #
    # Before this fix: ALB probed `/health` on nginx which always returned
    # 200, so a dead gateway behind a healthy nginx kept the instance
    # registered and the ALB happily routed live traffic to a dead backend.
    #
    # /healthz  → proxies to gateway:8000/health with a tight 2s timeout.
    #             A dead/slow gateway returns 502, which the ALB target
    #             group treats as unhealthy → instance is deregistered.
    # /health   → STATIC 200 retained for Kubernetes-style liveness probes
    #             and Docker HEALTHCHECK lines that only care that the
    #             web frontend itself is alive (not the upstream).
    #
    # Gateway exposes `/health` (see sdk/utils.py setup_app); we keep the
    # nginx-facing route distinct (`/healthz`) so the ALB target-group
    # path is unambiguous and so dashboards/runbooks can tell them apart.
    location = /healthz {
        access_log off;
        proxy_pass http://gateway:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Tight timeouts: a slow gateway is an unhealthy gateway. The ALB
        # target group's timeout is 5s so we leave ~3s of headroom.
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
        proxy_send_timeout 2s;
        # On any upstream failure (502/503/504/timeout/connect-refused)
        # let nginx surface the 5xx as-is — that's exactly the signal the
        # ALB target group needs to mark the instance unhealthy.
        proxy_next_upstream off;
    }

    # Lightweight health endpoint for Docker HEALTHCHECK and k8s liveness.
    # Intentionally a static 200 — answers "is nginx itself alive?", not
    # "is the gateway alive?". Do NOT point the ALB target group here.
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
