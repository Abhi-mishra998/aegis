apiVersion: v1
kind: ConfigMap
metadata:
  name: acp-config
  namespace: acp
data:
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRY_MINUTES: "15"
  
  # Internal Cluster DNS URLs
  REGISTRY_SERVICE_URL: "http://registry-service:8000"
  IDENTITY_SERVICE_URL: "http://identity-service:8000"
  POLICY_SERVICE_URL: "http://policy-service:8000"
  AUDIT_SERVICE_URL: "http://audit-service:8000"
  API_SERVICE_URL: "http://api-service:8000"
  USAGE_SERVICE_URL: "http://usage-service:8000"
  OPA_URL: "http://opa-service:8181"
  
  # Databases
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres-service:5432/acp"
  REDIS_URL: "redis://redis-service:6379/0"
