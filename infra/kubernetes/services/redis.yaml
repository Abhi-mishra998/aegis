apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  namespace: acp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command:
          - redis-server
          - "--requirepass"
          - "$(REDIS_PASSWORD)"
          - "--appendonly"
          - "yes"
          - "--appendfsync"
          - "everysec"
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: acp-secrets
              key: REDIS_PASSWORD
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
          allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: acp
spec:
  selector:
    app: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
