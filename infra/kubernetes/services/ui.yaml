apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-deployment
  namespace: acp
  labels:
    app: ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
      - name: ui
        image: acp-ui:latest
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ui-service
  namespace: acp
spec:
  selector:
    app: ui
  type: LoadBalancer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
