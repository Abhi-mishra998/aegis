apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-deployment
  namespace: acp
  labels:
    app: audit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit
  template:
    metadata:
      labels:
        app: audit
    spec:
      containers:
      - name: audit
        image: acp-audit:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: acp-config
        - secretRef:
            name: acp-secrets
        resources:
          limits:
            cpu: "300m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: audit-service
  namespace: acp
spec:
  selector:
    app: audit
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
