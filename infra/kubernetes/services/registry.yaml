apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-deployment
  namespace: acp
  labels:
    app: registry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
      - name: registry
        image: acp-registry:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: acp-config
        - secretRef:
            name: acp-secrets
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: registry-service
  namespace: acp
spec:
  selector:
    app: registry
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
