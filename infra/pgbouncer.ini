[databases]
acp_registry        = host=acp_postgres port=5432 dbname=acp_registry
acp_identity        = host=acp_postgres port=5432 dbname=acp_identity
acp_audit           = host=acp_postgres port=5432 dbname=acp_audit
acp_api             = host=acp_postgres port=5432 dbname=acp_api
acp_usage           = host=acp_postgres port=5432 dbname=acp_usage
acp_identity_graph  = host=acp_postgres port=5432 dbname=acp_identity_graph
acp_flight_recorder = host=acp_postgres port=5432 dbname=acp_flight_recorder
acp_autonomy        = host=acp_postgres port=5432 dbname=acp_autonomy
acp_behavior        = host=acp_postgres port=5432 dbname=acp_behavior

# Read-only replica connections (for reporting/forensics queries)
acp_audit_ro = host=acp_postgres_replica port=5432 dbname=acp_audit
acp_identity_ro = host=acp_postgres_replica port=5432 dbname=acp_identity

[pgbouncer]
listen_port = 6432
listen_addr = 0.0.0.0
# 2026-05-13 DEMO MODE: Reverted to `plain` after the SCRAM rollout broke
# startup (PgBouncer → Postgres auth as pgbouncer_admin was failing).
# `plain` matches what's stored in userlist.txt directly, so it works with
# both plaintext-only Postgres users and SCRAM-stored Postgres users.
# The SCRAM auth_query setup in init-db.sql remains in place — re-enable
# scram-sha-256 + auth_user/auth_query when you've validated the SCRAM
# verifier roundtrip in a staging environment.
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 500
# Sprint 2 perf (2026-05-15): bumped from 25→50 default_pool_size and
# 10→20 reserve_pool_size. At 200 concurrent users × ~3 DB-touching
# services per /execute call, the previous 25-connection ceiling
# queued under bursts and added 50-200ms to p99. 50 fits comfortably
# within Postgres's max_connections (the per-database conn budget is
# 50 × 8 dbs = 400, well under the typical 500 limit).
default_pool_size = 50
reserve_pool_size = 20
reserve_pool_timeout = 2
server_idle_timeout = 60
server_lifetime = 3600
query_wait_timeout = 120
ignore_startup_parameters = extra_float_digits, statement_timeout
admin_users = postgres
