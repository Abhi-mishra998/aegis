# Prometheus scrape configuration for ACP (2026-05-14)
# Each service exposes /metrics via prometheus_fastapi_instrumentator + our
# custom counters/gauges in sdk/utils.py.
global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: acp-local

rule_files:
  - "/etc/prometheus/rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: acp-services
    metrics_path: /metrics
    # /metrics is internal-only on the gateway; ship the INTERNAL_SECRET
    # in every scrape so the gateway middleware lets us through. Identity,
    # audit, policy etc are reached on their direct ports (not via the
    # gateway), so they don't enforce this — only the gateway does.
    authorization:
      type: ""
    http_headers:
      X-Internal-Secret:
        secrets:
          - "${INTERNAL_SECRET}"
    static_configs:
      - targets:
          - "gateway:8000"
          - "audit:8000"
          - "usage:8000"
          - "decision:8000"
          - "policy:8000"
          - "registry:8000"
          - "identity:8000"
          - "behavior:8000"
          - "insight:8000"
          - "forensics:8000"
          - "identity_graph:8000"
          - "flight_recorder:8000"
          - "autonomy:8000"
          - "api:8000"
        labels:
          env: local

  - job_name: prometheus-self
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  - job_name: opa
    metrics_path: /metrics
    static_configs:
      - targets: ["opa:8181"]
        labels:
          env: local
