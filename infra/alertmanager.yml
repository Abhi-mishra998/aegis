# Alertmanager configuration for ACP
# Routes Prometheus alerts to Slack and (optionally) PagerDuty.
# Webhook URLs come from env at startup: SLACK_WEBHOOK_URL, PAGERDUTY_URL.
# If a URL is empty/missing alertmanager will log a delivery error but the
# config remains valid — operators must populate the env var to wire delivery.

global:
  resolve_timeout: 5m
  # Slack URL is the default fallback for receivers that don't override it.
  slack_api_url_file: /etc/alertmanager/slack_webhook_url

route:
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: slack

  routes:
    # Critical alerts: page via PagerDuty AND Slack; short repeat window.
    - matchers:
        - severity = "critical"
      receiver: critical
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 30m
      continue: true

receivers:
  - name: slack
    slack_configs:
      - channel: '#aegis-alerts'
        send_resolved: true
        title: '{{ .CommonAnnotations.summary }}'
        text: |-
          *Severity:* {{ .CommonLabels.severity }}
          *Service:*  {{ .CommonLabels.service }}
          *Status:*   {{ .Status }}
          {{ range .Alerts }}
          • {{ .Annotations.description }}
          {{ end }}

  - name: critical
    slack_configs:
      - channel: '#aegis-critical'
        send_resolved: true
        title: 'CRITICAL: {{ .CommonAnnotations.summary }}'
        text: |-
          *Service:* {{ .CommonLabels.service }}
          {{ range .Alerts }}
          • {{ .Annotations.description }}
          {{ end }}
    pagerduty_configs:
      - routing_key_file: /etc/alertmanager/pagerduty_routing_key
        send_resolved: true
        severity: critical
        description: '{{ .CommonAnnotations.summary }}'

inhibit_rules:
  # If the whole service is down, suppress its noisy downstream alerts.
  - source_matchers:
      - alertname = "ServiceUnavailable"
    target_matchers:
      - severity =~ "warning|critical"
    equal: ["service"]
