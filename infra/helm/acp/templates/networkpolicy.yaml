  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $ns }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "acp.name" . }}
      ports:
        - protocol: TCP
          port: {{ .Values.policy.containerPort }}
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6432
        - protocol: TCP
          port: 6379
    # OPA
    - ports:
        - protocol: TCP
          port: {{ .Values.opa.port }}
{{- end }}
