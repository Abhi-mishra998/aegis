{{- /*
ACP Secrets — External Secrets Operator (ESO) pattern.

IMPORTANT: Secrets are NEVER created inline by this chart.
They must exist in the cluster before deployment.

Two modes:
  1. externalSecrets.enabled=false (default):
     Pre-create secrets manually. See docs/k8s-secrets-setup.md.

  2. externalSecrets.enabled=true:
     ESO will sync secrets from your vault/secrets-manager automatically.
     Requires the External Secrets Operator to be installed:
       helm repo add external-secrets https://charts.external-secrets.io
       helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace

Both modes produce the same K8s Secret names that Deployments reference.
*/ -}}

{{- if .Values.externalSecrets.enabled }}
---
# ExternalSecret: ACP application secrets (JWT, INTERNAL_SECRET, GROQ_API_KEY)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.existingSecret }}
  namespace: {{ include "acp.namespace" . }}
  labels:
    {{- include "acp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: {{ .Values.externalSecrets.secretStoreKind }}
  target:
    name: {{ .Values.existingSecret }}
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefPrefix }}/jwt
        property: secret_key
    - secretKey: INTERNAL_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefPrefix }}/internal
        property: secret
    - secretKey: GROQ_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefPrefix }}/groq
        property: api_key
---
# ExternalSecret: Database credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.postgresql.existingSecret }}
  namespace: {{ include "acp.namespace" . }}
  labels:
    {{- include "acp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: {{ .Values.externalSecrets.secretStoreKind }}
  target:
    name: {{ .Values.postgresql.existingSecret }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.postgresql.existingSecretUsernameKey }}
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefPrefix }}/postgres
        property: username
    - secretKey: {{ .Values.postgresql.existingSecretPasswordKey }}
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefPrefix }}/postgres
        property: password
    - secretKey: {{ .Values.postgresql.existingSecretDatabaseUrlKey }}
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefPrefix }}/postgres
        property: database_url
---
# ExternalSecret: Redis credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.redis.existingSecret }}
  namespace: {{ include "acp.namespace" . }}
  labels:
    {{- include "acp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: {{ .Values.externalSecrets.secretStoreKind }}
  target:
    name: {{ .Values.redis.existingSecret }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.redis.existingSecretRedisUrlKey }}
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefPrefix }}/redis
        property: redis_url
{{- else }}
---
# When externalSecrets.enabled=false, secrets must be pre-created manually.
# This placeholder confirms the expected secret names exist at deploy time.
# Run: kubectl get secret {{ .Values.existingSecret }} -n {{ include "acp.namespace" . }}
#
# If you see "secret not found" errors during helm install, follow:
#   docs/k8s-secrets-setup.md
#
# To verify before deploying:
#   helm template . | grep secretKeyRef | awk '{print $NF}' | sort -u
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "acp.fullname" . }}-secrets-notice
  namespace: {{ include "acp.namespace" . }}
  labels:
    {{- include "acp.labels" . | nindent 4 }}
  annotations:
    # This ConfigMap is a no-op placeholder. Actual secrets must be
    # pre-created. See docs/k8s-secrets-setup.md.
    aegisagent.in/secrets-mode: manual
data:
  notice: |
    ACP secrets are managed externally. Required secrets:
      - {{ .Values.existingSecret }}
          keys: JWT_SECRET_KEY, INTERNAL_SECRET, GROQ_API_KEY
      - {{ .Values.postgresql.existingSecret }}
          keys: {{ .Values.postgresql.existingSecretDatabaseUrlKey }}
      - {{ .Values.redis.existingSecret }}
          keys: {{ .Values.redis.existingSecretRedisUrlKey }}
    Run: docs/k8s-secrets-setup.md for creation instructions.
{{- end }}
