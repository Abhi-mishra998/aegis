{{- if .Values.forensics.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "acp.fullname" . }}-forensics
  namespace: {{ include "acp.namespace" . }}
  labels:
    {{- include "acp.componentLabels" (dict "component" "forensics" "ctx" $) | nindent 4 }}
  {{- with .Values.global.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # Forensics is read-heavy and stateless (reads from acp_audit DB).
  # Safe to scale horizontally for investigation parallelism.
  replicas: {{ .Values.forensics.replicas }}
  selector:
    matchLabels:
      {{- include "acp.componentSelectorLabels" (dict "component" "forensics" "ctx" $) | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "acp.componentSelectorLabels" (dict "component" "forensics" "ctx" $) | nindent 8 }}
      {{- with .Values.forensics.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "acp.serviceAccountName" . }}
      securityContext:
        {{- include "acp.podSecurityContext" . | nindent 8 }}
      {{- with .Values.forensics.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: forensics
          image: {{ include "acp.image" (dict "component" .Values.forensics "ctx" $) }}
          imagePullPolicy: {{ include "acp.imagePullPolicy" . }}
          securityContext:
            {{- include "acp.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.forensics.containerPort }}
              protocol: TCP
          {{- with .Values.forensics.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.forensics.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.forensics.resources | nindent 12 }}
          env:
            # ── Global config (non-secret) ──────────────────────
            {{- include "acp.globalEnv" . | nindent 12 }}
            # ── Secrets (injected from K8s secrets) ────────────
            {{- include "acp.secretEnvRefs" . | nindent 12 }}
            # ── Service URLs ────────────────────────────────────
            - name: AUDIT_SERVICE_URL
              value: "http://{{ include "acp.fullname" . }}-audit:8004"
            # ── Pod identity (useful for log correlation) ───────
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: {{ include "acp.fullname" . }}-config
          volumeMounts:
            {{- include "acp.tmpVolumeMount" . | nindent 12 }}
      volumes:
        {{- include "acp.tmpVolume" . | nindent 8 }}
{{- end }}
