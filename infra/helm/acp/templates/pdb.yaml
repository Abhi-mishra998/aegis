{{- /*
PodDisruptionBudgets (PDBs) protect audit and identity from simultaneous
pod eviction during node maintenance, cluster upgrades, or chaos events.

Audit: minAvailable=1 ensures the audit chain writer is never fully offline.
Identity: minAvailable=1 ensures JWT issuance is never fully blocked.

Enabled independently via .Values.audit.pdb.enabled and .Values.identity.pdb.enabled.
*/ -}}

{{- if and .Values.audit.enabled .Values.audit.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "acp.fullname" . }}-audit
  namespace: {{ include "acp.namespace" . }}
  labels:
    {{- include "acp.componentLabels" (dict "component" "audit" "ctx" $) | nindent 4 }}
spec:
  minAvailable: {{ .Values.audit.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "acp.componentSelectorLabels" (dict "component" "audit" "ctx" $) | nindent 6 }}
{{- end }}

