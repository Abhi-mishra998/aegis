{{- if .Values.behavior.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "acp.fullname" . }}-behavior
  namespace: {{ include "acp.namespace" . }}
  labels:
    {{- include "acp.componentLabels" (dict "component" "behavior" "ctx" $) | nindent 4 }}
  {{- with .Values.global.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # NOTE: behavior is a hot-path behavioral engine consulted on every /execute call.
  # Default replicas=2 for HA; HPA scales to 10 on CPU pressure.
  # See benchmark notes: single-instance bottleneck at ~47 r/s (Run-3 2026-05-13).
  replicas: {{ .Values.behavior.replicas }}
  selector:
    matchLabels:
      {{- include "acp.componentSelectorLabels" (dict "component" "behavior" "ctx" $) | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "acp.componentSelectorLabels" (dict "component" "behavior" "ctx" $) | nindent 8 }}
      {{- with .Values.behavior.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "acp.serviceAccountName" . }}
      securityContext:
        {{- include "acp.podSecurityContext" . | nindent 8 }}
      # Spread behavior pods across nodes — this is the hot-path detection engine;
      # a single-node blast radius would degrade all behavioral risk signals simultaneously.
      {{- with .Values.behavior.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: behavior
          image: {{ include "acp.image" (dict "component" .Values.behavior "ctx" $) }}
          imagePullPolicy: {{ include "acp.imagePullPolicy" . }}
          securityContext:
            {{- include "acp.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.behavior.containerPort }}
              protocol: TCP
          {{- with .Values.behavior.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.behavior.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.behavior.resources | nindent 12 }}
          env:
            # ── Global config (non-secret) ──────────────────────
            {{- include "acp.globalEnv" . | nindent 12 }}
            # ── Secrets (injected from K8s secrets) ────────────
            {{- include "acp.secretEnvRefs" . | nindent 12 }}
            # ── Pod identity (useful for log correlation) ───────
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: {{ include "acp.fullname" . }}-config
          volumeMounts:
            {{- include "acp.tmpVolumeMount" . | nindent 12 }}
      volumes:
        {{- include "acp.tmpVolume" . | nindent 8 }}
{{- end }}
