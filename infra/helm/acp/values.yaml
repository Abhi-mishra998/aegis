# ACP Helm Chart — Default Values
# Reference: sdk/common/config.py for all env var semantics.
# Override in values.prod.yaml for production deployments.

# ─────────────────────────────────────────────────────────────
# Global
# ─────────────────────────────────────────────────────────────
global:
  image:
    registry: ghcr.io/acp
    pullPolicy: IfNotPresent
    tag: "0.2.0"
  # Labels added to every resource
  commonLabels: {}
  # Annotations added to every resource
  commonAnnotations: {}
  env:
    ENVIRONMENT: production
    LOG_LEVEL: INFO
    OPA_FAIL_MODE: closed
    JWT_ALGORITHM: HS256
    JWT_EXPIRY_MINUTES: "15"
    # Hot-path safety valves
    MAX_CONCURRENT_EXECUTION: "500"
    MAX_PAYLOAD_BYTES: "10000"
    # Decision service timeouts (seconds)
    DECISION_GATHER_TOTAL_TIMEOUT: "1.5"
    RESILIENT_CONNECT_TIMEOUT_MS: "100"

# ─────────────────────────────────────────────────────────────
# Namespace
# ─────────────────────────────────────────────────────────────
namespaceOverride: ""

# ─────────────────────────────────────────────────────────────
# Gateway
# ─────────────────────────────────────────────────────────────
gateway:
  enabled: true
  replicas: 3
  image:
    name: acp-gateway
  containerPort: 8000
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "1Gi"
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /readiness
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  podAnnotations: {}
  # PodDisruptionBudget — gateway has HPA so no PDB by default
  pdb:
    enabled: false
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: acp
                app.kubernetes.io/component: gateway
            topologyKey: kubernetes.io/hostname

