# ─────────────────────────────────────────────────────────────
# Ingress
# ─────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/use-regex: "true"
  host: acp.example.com
  tls:
    enabled: true
    secretName: acp-tls

# ─────────────────────────────────────────────────────────────
# Network Policies
# ─────────────────────────────────────────────────────────────
networkPolicy:
  enabled: true
  # CIDR of ingress controller pods — allows external ingress to gateway
  ingressControllerNamespace: ingress-nginx

# ─────────────────────────────────────────────────────────────
# External dependencies
# ─────────────────────────────────────────────────────────────
postgresql:
  # Set external: true to point at AWS RDS, GCP CloudSQL, etc.
  # When false, a simple in-cluster Postgres is deployed (dev/CI only —
  # not recommended for production; use a managed database).
  external: true
  host: ""
  port: 5432
  database: acp
  # Name of a pre-created K8s Secret containing:
  #   username, password, DATABASE_URL
  existingSecret: acp-db-credentials
  existingSecretUsernameKey: username
  existingSecretPasswordKey: password
  existingSecretDatabaseUrlKey: DATABASE_URL

redis:
  # Set external: true to point at ElastiCache, MemoryStore, etc.
  external: false
  host: ""
  port: 6379
  database: 0
  # When external: true, name of pre-created Secret containing:
  #   REDIS_URL
  existingSecret: acp-redis-credentials
  existingSecretRedisUrlKey: REDIS_URL

opa:
  # If bundled OPA sidecar/service is deployed alongside ACP.
  # Set to false if using an existing OPA instance.
  enabled: true
  image: openpolicyagent/opa:latest-rootless
  port: 8181
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ─────────────────────────────────────────────────────────────
# Secrets configuration
# External Secrets Operator (ESO) is the preferred approach.
# Set externalSecrets.enabled: true to use ESO.
# Otherwise secrets must be pre-created manually.
# See docs/k8s-secrets-setup.md.
# ─────────────────────────────────────────────────────────────
externalSecrets:
  enabled: false
  # ESO SecretStore name (ClusterSecretStore or SecretStore)
  secretStoreName: acp-vault-store
  secretStoreKind: ClusterSecretStore
  # Remote vault path prefix for all ACP secrets
  remoteRefPrefix: secret/acp
  refreshInterval: 1h

# Name of the pre-created K8s Secret that holds ACP application secrets.
# Keys expected: JWT_SECRET_KEY, INTERNAL_SECRET, GROQ_API_KEY
# See docs/k8s-secrets-setup.md for the full list.
existingSecret: acp-secrets

# ─────────────────────────────────────────────────────────────
# Service Account
# ─────────────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ─────────────────────────────────────────────────────────────
# Pod Security
# ─────────────────────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ─────────────────────────────────────────────────────────────
# Observability
# ─────────────────────────────────────────────────────────────
metrics:
  enabled: true
  port: 9090
  path: /metrics
  serviceMonitor:
    enabled: false
    interval: 30s
    namespace: monitoring
