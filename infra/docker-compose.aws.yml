# infra/docker-compose.aws.yml
# AWS production override — removes local postgres/redis, uses RDS + ElastiCache
# Usage: docker compose -f docker-compose.yml -f docker-compose.aws.yml up -d

services:
  # ── Remove local postgres (RDS replaces it) ──────────────────────────────
  postgres:
    profiles: ["local-only"]   # never starts in production

  postgres_replica:
    profiles: ["local-only"]   # never starts in production

  # ── Remove local redis (ElastiCache replaces it) ──────────────────────────
  redis:
    profiles: ["local-only"]   # never starts in production

  # ── PgBouncer: use AWS config pointing to RDS ─────────────────────────────
  pgbouncer:
    volumes:
      - ./pgbouncer.aws.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on: []   # no local postgres dependency
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          cpus: "0.10"
          memory: 32M

  # ── Gateway: entry point, highest-traffic ────────────────────────────────
  gateway:
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=WARNING
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ── All services: production restart policy + resource limits ─────────────
  identity:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M

  registry:
