# infra/docker-compose.aws.yml
# AWS production override — removes local postgres/redis, uses RDS + ElastiCache
# Usage: docker-compose -f docker-compose.yml -f docker-compose.aws.yml up -d

services:
  # ── Remove local postgres (RDS replaces it) ──────────────────────────────
  postgres:
    profiles: ["local-only"]

  postgres_replica:
    profiles: ["local-only"]

  # ── Remove local redis (ElastiCache replaces it) ──────────────────────────
  redis:
    profiles: ["local-only"]

  # ── PgBouncer: use AWS config pointing to RDS ─────────────────────────────
  pgbouncer:
    volumes:
      - ./pgbouncer.aws.ini:/etc/pgbouncer/pgbouncer.ini:ro
      # P1-4 partial (2026-06-21): userlist.txt now lives in /run/aegis tmpfs
      # rather than /opt/aegis on EBS. EBS snapshot theft / disk forensics
      # no longer surface the plaintext per-db passwords. Live shell on the
      # EC2 still reads them — the full fix (pgbouncer auth_query + SCRAM
      # password hashes) needs Postgres schema work and is tracked separately.
      # user_data renders /run/aegis/pgbouncer/userlist.txt at boot from
      # the SSM SecureString; tmpfs means it never persists to disk.
      - /run/aegis/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 64M            # measured RSS=5M
        reservations:
          cpus: "0.10"
          memory: 16M

  # ── Gateway ────────────────────────────────────────────────────────────────
  gateway:
    depends_on: []
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=WARNING
      # R1 — explicit Python memory tuning to stop the gateway OOM cascade.
      # MALLOC_ARENA_MAX=2 caps glibc's per-thread arenas (saves 100–200 MB
      # on a 2-worker uvicorn). PYTHONMALLOC=malloc uses the system
      # allocator instead of pymalloc — slightly slower allocs, but
      # predictable peak RSS. Without these the workers slowly grow until
      # the OS OOM-killer fires under any concurrent demo load.
      - MALLOC_ARENA_MAX=2
      - PYTHONMALLOC=malloc
      - ACP_MESH_SERVICE_NAME=gateway
      - ACP_MESH_PRIVATE_KEY_PEM=${MESH_GATEWAY_PRIVATE_KEY:-}
      - ACP_MESH_TRUSTED_KEYS=${ACP_MESH_TRUSTED_KEYS:-}
      # /demo/spawn-workspace fans out to scripts/ops/seed_demo_workspace.py
      # which inserts the OWNER lookup row in acp_identity then writes 5
      # agents + 60 audit rows across acp_registry/audit/api. Its _swap()
      # helper rewrites `identity_user` → `<service>_user` and
      # `identity_prod_pwd` → `<service>_prod_pwd`. The gateway's normal
      # DATABASE_URL is audit-scoped, so we pass a dedicated identity-user
      # DSN here. These are pgbouncer routing creds, not the RDS master.
      - SEED_DEMO_DB_URL=postgresql+asyncpg://identity_user:identity_prod_pwd@pgbouncer:6432/acp_identity
    volumes:
      # Bind-mount the seed script from the host bundle so it's reachable
      # at /app/scripts/ops/... without needing a Dockerfile rebuild on
      # every safe_deploy. The Dockerfile also COPYs it (so a fresh ASG
      # launch that uses the baked image still works) — this mount is
      # belt-and-suspenders for the existing-host tar-update path.
      - /opt/aegis/scripts:/app/scripts:ro
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.00"
          # R1 — 768 MB ÷ 2 uvicorn workers = ~384 MB/worker; under any
          # concurrent /execute the workers paged into OOM. Lifting to
          # 1024 MB gives ~512 MB/worker which is comfortable for the
          # FastAPI + httpx + redis + pydantic + structlog footprint.
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ── All services: depends_on cleared (no local redis/postgres in prod) ─────
  # R1 — Sprint memory tuning. Total committed memory across the 18
  # containers was 5.9 GB on a 4 GB m6g.medium (44% over-committed).
  # That worked when no service was under load, but the moment two
  # workers needed a few hundred MB each the OS OOM-killer fired
  # randomly — the gateway took the brunt because it was busiest.
  # New allocation prioritizes the demo hot path (gateway / audit /
  # policy / decision / opa) and trims low-traffic services.
  identity:
    environment:
      - ACP_MESH_SERVICE_NAME=identity
      - ACP_MESH_PRIVATE_KEY_PEM=${MESH_IDENTITY_PRIVATE_KEY:-}
      - ACP_MESH_TRUSTED_KEYS=${ACP_MESH_TRUSTED_KEYS:-}
    depends_on: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.00"
          # Sized for m6g.large host. Identity workload is wizard create,
          # JWT mint, Clerk webhook + DB writes. Steady-state RSS=252M;
          # 480M gives ~90% headroom for bursty wizard onboarding traffic.
          memory: 480M
        reservations:
          cpus: "0.25"
          memory: 128M

  registry:
    environment:
      - ACP_MESH_SERVICE_NAME=registry
      - ACP_MESH_PRIVATE_KEY_PEM=${MESH_REGISTRY_PRIVATE_KEY:-}
      - ACP_MESH_TRUSTED_KEYS=${ACP_MESH_TRUSTED_KEYS:-}
    depends_on: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.50"
          # m6g.large sizing. Steady RSS=255M; lifted to 480M to cover
          # wizard bursts (agent create + permissions whitelist + API key
          # mint all in one POST) without ever hitting 75% headroom.
          memory: 480M
        reservations:
          cpus: "0.10"
          memory: 96M

  policy:
    environment:
      - ACP_MESH_SERVICE_NAME=policy
      - ACP_MESH_PRIVATE_KEY_PEM=${MESH_POLICY_PRIVATE_KEY:-}
      - ACP_MESH_TRUSTED_KEYS=${ACP_MESH_TRUSTED_KEYS:-}
    depends_on: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.50"
          # m6g.large sizing. Steady RSS=240M; pattern catalog + scoring
          # pipeline grows under concurrent /execute. 480M covers concurrent
          # decision bursts comfortably.
          memory: 480M
        reservations:
          cpus: "0.10"
          memory: 128M

  audit:
    environment:
      - ACP_MESH_SERVICE_NAME=audit
      - ACP_MESH_PRIVATE_KEY_PEM=${MESH_AUDIT_PRIVATE_KEY:-}
      - ACP_MESH_TRUSTED_KEYS=${ACP_MESH_TRUSTED_KEYS:-}
    depends_on: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.50"
          # 192M was sized off idle RSS=102M, but Sprint 5/6 added the
          # evaluation runner + shadow worker + online_eval_worker into
          # the same process, AND the compliance-bundle builder
          # serializes the full daily audit-chain to JSON. Under that
          # combined load RSS crossed 192M and the container OOM-cycled
          # 543 times in 24h. Measured peak ~290M during compliance
          # bundle build; 320M gave ~10% headroom but in practice idle
          # RSS sits at ~232M (72% of cap), one bursty XREADGROUP batch
          # away from OOM. Bumped to 512M for a comfortable buffer.
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 64M

  decision:
    environment:
      - ACP_MESH_SERVICE_NAME=decision
      - ACP_MESH_PRIVATE_KEY_PEM=${MESH_DECISION_PRIVATE_KEY:-}
      - ACP_MESH_TRUSTED_KEYS=${ACP_MESH_TRUSTED_KEYS:-}
    depends_on: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.75"
          # 2026-06-15 — 480M was sized off RSS=363M but live steady-state
          # hit 88.98% (427MiB/480MiB) under normal traffic. Sprint 5/6
          # rule-cache + session-intel state pushed working set higher
          # than the original measurement. Bumped to 576M (~30% headroom
          # over observed 427MiB peak).
          memory: 576M
        reservations:
          cpus: "0.20"
          memory: 128M

  behavior:
    environment:
      - ACP_MESH_SERVICE_NAME=behavior
      - ACP_MESH_PRIVATE_KEY_PEM=${MESH_BEHAVIOR_PRIVATE_KEY:-}
      - ACP_MESH_TRUSTED_KEYS=${ACP_MESH_TRUSTED_KEYS:-}
    depends_on: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.75"
          # m6g.large sizing. Behavior is the per-tenant rolling-baseline
          # + 3σ burst detector — the working set grows with active tenant
          # count. Live observed 96% on 416M = imminent OOM under any real
          # traffic. 640M gives proper headroom on m6g.large host.
          memory: 640M
        reservations:
          cpus: "0.20"
          memory: 128M

  usage:
    environment:
      - ACP_MESH_SERVICE_NAME=usage
      - ACP_MESH_PRIVATE_KEY_PEM=${MESH_USAGE_PRIVATE_KEY:-}
      - ACP_MESH_TRUSTED_KEYS=${ACP_MESH_TRUSTED_KEYS:-}
    depends_on: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 160M           # 256 → 160 (idle billing path most of the time)
        reservations:
          cpus: "0.05"
          memory: 48M

  api:
    environment:
      - ACP_MESH_SERVICE_NAME=api
      - ACP_MESH_PRIVATE_KEY_PEM=${MESH_API_PRIVATE_KEY:-}
      - ACP_MESH_TRUSTED_KEYS=${ACP_MESH_TRUSTED_KEYS:-}
    depends_on: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M           # 256 → 192
        reservations:
          cpus: "0.05"
          memory: 48M

  insight:
    environment:
      - ACP_MESH_SERVICE_NAME=insight
      - ACP_MESH_PRIVATE_KEY_PEM=${MESH_INSIGHT_PRIVATE_KEY:-}
      - ACP_MESH_TRUSTED_KEYS=${ACP_MESH_TRUSTED_KEYS:-}
    depends_on: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M           # measured RSS=68M, +88% headroom
        reservations:
          cpus: "0.05"
          memory: 32M

  insight_worker:
    depends_on: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 96M            # measured RSS=62M
        reservations:
          cpus: "0.05"
          memory: 32M

  forensics:
    environment:
      - ACP_MESH_SERVICE_NAME=forensics
      - ACP_MESH_PRIVATE_KEY_PEM=${MESH_FORENSICS_PRIVATE_KEY:-}
      - ACP_MESH_TRUSTED_KEYS=${ACP_MESH_TRUSTED_KEYS:-}
    depends_on: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 320M           # measured RSS=242M, +30% headroom
        reservations:
          cpus: "0.10"
          memory: 64M

  identity_graph:
    environment:
      - ACP_MESH_SERVICE_NAME=identity_graph
      - ACP_MESH_PRIVATE_KEY_PEM=${MESH_IDENTITY_GRAPH_PRIVATE_KEY:-}
      - ACP_MESH_TRUSTED_KEYS=${ACP_MESH_TRUSTED_KEYS:-}
    depends_on: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 160M           # 256 → 160 (read-mostly graph cache)
        reservations:
          cpus: "0.05"
          memory: 48M

  flight_recorder:
    environment:
      - ACP_MESH_SERVICE_NAME=flight_recorder
      - ACP_MESH_PRIVATE_KEY_PEM=${MESH_FLIGHT_RECORDER_PRIVATE_KEY:-}
      - ACP_MESH_TRUSTED_KEYS=${ACP_MESH_TRUSTED_KEYS:-}
    depends_on: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M           # 192 → 128 (idle event sink)
        reservations:
          cpus: "0.05"
          memory: 32M

  autonomy:
    environment:
      - ACP_MESH_SERVICE_NAME=autonomy
      - ACP_MESH_PRIVATE_KEY_PEM=${MESH_AUTONOMY_PRIVATE_KEY:-}
      - ACP_MESH_TRUSTED_KEYS=${ACP_MESH_TRUSTED_KEYS:-}
    depends_on: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M           # 192 → 128 (autonomy on hot path but tiny RSS)
        reservations:
          cpus: "0.05"
          memory: 32M

  # groq_worker removed in sprint-3.3 (2026-05-29); insight_worker is the
  # canonical consumer of acp:groq_queue.

  opa:
    depends_on: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 96M            # measured RSS=40M
        reservations:
          cpus: "0.10"
          memory: 32M

  bundle-server:
    depends_on: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 64M            # 128 → 64 (it's `python -m http.server`)
        reservations:
          cpus: "0.02"
          memory: 16M

  ui:
    depends_on: []
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M            # measured RSS=3M (it's nginx serving static)
        reservations:
          cpus: "0.05"
          memory: 16M
