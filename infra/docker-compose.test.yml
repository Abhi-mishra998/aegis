services:
  # ─────────────────────────────────────────
  # TEST DATABASE (in-memory via tmpfs, ephemeral)
  # ─────────────────────────────────────────
  postgres_test:
    image: postgres:15-alpine
    container_name: acp_postgres_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: acp_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10

  # ─────────────────────────────────────────
  # TEST REDIS (in-memory via tmpfs, ephemeral)
  # ─────────────────────────────────────────
  redis_test:
    image: redis:7-alpine
    container_name: acp_redis_test
    ports:
      - "6380:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10