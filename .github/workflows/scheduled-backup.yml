name: Nightly backup

on:
  schedule:
    # 02:00 UTC — runs before the prune job so the day's full state is captured.
    - cron: "0 2 * * *"
  workflow_dispatch: {}

concurrency:
  group: scheduled-backup
  cancel-in-progress: false

jobs:
  backup:
    name: pg_dump + age encrypt + S3 upload
    runs-on: ubuntu-latest
    steps:
      - name: SSH to EC2 and run backup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 60m
          script: |
            set -euo pipefail
            cd ~/aegis
            # scripts/ops/backup.sh shells out to pg_dump → age → aws s3 cp.
            # Env vars (AWS_REGION, AGE_RECIPIENT, S3_BACKUP_BUCKET) live in
            # /etc/aegis/backup.env on the host, owned root:root mode 0600.
            sudo -E bash scripts/ops/backup.sh 2>&1 | tee -a /var/log/aegis-backup.log

      - name: Post Slack summary
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_OPS_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then exit 0; fi
          status="${{ job.status }}"
          payload=$(jq -n --arg s "$status" --arg run "${{ github.run_id }}" \
            '{text: ("Nightly backup: " + $s + " — run " + $run)}')
          curl -fsS -X POST -H "Content-Type: application/json" -d "$payload" "$SLACK_WEBHOOK_URL" || true
