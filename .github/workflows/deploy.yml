name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/acp_test"
      REDIS_URL: "redis://localhost:6379"
      JWT_SECRET_KEY: "ci-unit-test-jwt-secret-not-for-production"
      GROQ_API_KEY: "ci-unit-test-groq-key-placeholder"
      INTERNAL_SECRET: "ci-unit-test-internal-secret-placeholder"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev,server]"

      - name: Run tests
        run: |
          python -m pytest tests/ \
            -m "not integration" \
            -q --tb=short --no-header

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 600s
          debug: true
          script: |
            set -e

            echo "=== Pulling latest code ==="
            cd ~/aegis
            git pull origin main

            echo "=== Pulling config from S3 ==="
            aws s3 cp s3://acp-backups-prod-am/config/.env ~/aegis/infra/.env
            aws s3 cp s3://acp-backups-prod-am/config/pgbouncer.aws.ini ~/aegis/infra/pgbouncer.aws.ini
            aws s3 cp s3://acp-backups-prod-am/config/userlist.txt ~/aegis/infra/userlist.txt

            echo "=== Rebuilding containers ==="
            cd ~/aegis/infra
            # || true: prevent deploy failure if a service health-check races during
            # alembic migrations. The wait loop below is the real pass/fail gate.
            docker-compose \
              -f docker-compose.yml \
              -f docker-compose.aws.yml \
              up -d --build || true

            echo "=== Waiting for services (up to 5 min) ==="
            SECONDS_WAITED=0
            REQUIRED_HEALTHY=20
            until [ "$(docker ps --format '{{.Status}}' | grep -c '(healthy)')" -ge $REQUIRED_HEALTHY ] \
                  || [ $SECONDS_WAITED -ge 300 ]; do
              sleep 10
              SECONDS_WAITED=$((SECONDS_WAITED + 10))
              HEALTHY=$(docker ps --format '{{.Status}}' | grep -c '(healthy)' || echo 0)
              echo "  ${HEALTHY} containers healthy (${SECONDS_WAITED}s elapsed)"
            done

            echo "=== Final container states ==="
            docker ps --format "{{.Names}}\t{{.Status}}" | sort

            HEALTHY=$(docker ps --format '{{.Status}}' | grep -c '(healthy)' || echo 0)
            TOTAL=$(docker ps -q | wc -l)
            echo "Result: ${HEALTHY}/${TOTAL} containers healthy"

            if [ "$HEALTHY" -lt "$REQUIRED_HEALTHY" ]; then
              echo "ERROR: Only ${HEALTHY}/${TOTAL} healthy after 5 minutes"
              docker ps --format "{{.Names}}\t{{.Status}}" | grep -v "(healthy)"
              exit 1
            fi

            echo "=== Cleaning up old images ==="
            docker image prune -f

            echo "=== Deploy complete: ${HEALTHY}/${TOTAL} healthy ==="
