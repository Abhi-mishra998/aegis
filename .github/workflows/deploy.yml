name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/acp_test"
      REDIS_URL: "redis://localhost:6379"
      JWT_SECRET_KEY: "ci-unit-test-jwt-secret-not-for-production"
      GROQ_API_KEY: "ci-unit-test-groq-key-placeholder"
      INTERNAL_SECRET: "ci-unit-test-internal-secret-placeholder"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev,server]"

      - name: Run tests
        run: |
          python -m pytest tests/ \
            -m "not integration" \
            -q --tb=short --no-header

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 600s
          debug: true
          script: |
            set -e

            echo "=== Pulling latest code ==="
            cd ~/aegis
            git pull origin main

            echo "=== Pulling config from S3 ==="
            aws s3 cp s3://acp-backups-prod-am/config/.env ~/aegis/infra/.env
            aws s3 cp s3://acp-backups-prod-am/config/pgbouncer.aws.ini ~/aegis/infra/pgbouncer.aws.ini
            aws s3 cp s3://acp-backups-prod-am/config/userlist.txt ~/aegis/infra/userlist.txt

            echo "=== Building images ==="
            cd ~/aegis/infra
            # Hard fail on build errors — no || true here
            docker-compose \
              -f docker-compose.yml \
              -f docker-compose.aws.yml \
              build

            echo "=== Starting containers ==="
            # || true is intentional and scoped: docker-compose up can exit non-zero
            # if a container's health check hasn't passed by the time a dependent
            # service tries to start (a startup race, not a build failure).
            # The named-service gate below is the real pass/fail signal.
            docker-compose \
              -f docker-compose.yml \
              -f docker-compose.aws.yml \
              up -d --no-build || true

            echo "=== Waiting for required services (up to 5 min) ==="
            # These are the services that must be healthy for the platform to work.
            # audit is listed first — it is the security-critical service.
            REQUIRED="acp_audit acp_gateway acp_identity acp_registry acp_api acp_usage acp_decision acp_pgbouncer acp_opa"
            WAITED=0
            while [ $WAITED -lt 300 ]; do
              STILL_WAITING=""
              for svc in $REQUIRED; do
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$svc" 2>/dev/null || echo "missing")
                if [ "$STATUS" != "healthy" ]; then
                  STILL_WAITING="$STILL_WAITING $svc[$STATUS]"
                fi
              done
              if [ -z "$STILL_WAITING" ]; then
                echo "  All required services healthy after ${WAITED}s"
                break
              fi
              sleep 10
              WAITED=$((WAITED + 10))
              echo "  ${WAITED}s — still waiting:$STILL_WAITING"
            done

            echo "=== Final container states ==="
            docker ps --format "{{.Names}}\t{{.Status}}" | sort

            echo "=== Health gate: checking required services ==="
            FAILED=""
            for svc in $REQUIRED; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$svc" 2>/dev/null || echo "missing")
              if [ "$STATUS" = "healthy" ]; then
                echo "  PASS  $svc"
              else
                echo "  FAIL  $svc [$STATUS]"
                FAILED="$FAILED $svc"
              fi
            done

            if [ -n "$FAILED" ]; then
              echo ""
              echo "=== Logs from failed services ==="
              for svc in $FAILED; do
                echo "--- $svc (last 30 lines) ---"
                docker logs --tail 30 "$svc" 2>&1 || true
                echo ""
              done
              echo "DEPLOY FAILED: required services not healthy:$FAILED"
              exit 1
            fi

            echo "=== Cleaning up old images ==="
            docker image prune -f

            TOTAL=$(docker ps --format '{{.Status}}' | grep -c '(healthy)' || echo 0)
            echo "=== Deploy complete — all required services healthy, ${TOTAL} total containers healthy ==="
