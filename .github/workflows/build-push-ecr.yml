name: Build & Push to ECR

# Triggers on every push to main. Pull requests are intentionally excluded —
# ECR push requires production credentials that should not run on untrusted forks.
on:
  push:
    branches: [main]

# Least-privilege: only the permissions required for OIDC token issuance.
# ECR GetAuthorizationToken + push rights come from the IAM role, not the token.
permissions:
  id-token: write   # Required for OIDC → AWS role assumption
  contents: read    # Required for actions/checkout

# Prevent concurrent deployments of the same branch — cancel any in-progress
# run when a new push lands on main. This avoids two pushes racing to tag
# :latest with different SHAs.
concurrency:
  group: ecr-push-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  # Replace with your actual 12-digit AWS account ID.
  # Recommendation: store as a repository variable (not a secret) so it's
  # visible in workflow logs without being sensitive.
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  # Short SHA used for immutable image tags — first 8 hex chars of the commit.
  SHORT_SHA: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Unit tests must pass before we spend time building.
  # Mirrors the logic from test.yml so this workflow is self-contained
  # and can gate the push independently of the test workflow status.
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (gate)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/acp_test"
      REDIS_URL: "redis://localhost:6379"
      JWT_SECRET_KEY: "ci-unit-test-jwt-secret-not-for-production"
      GROQ_API_KEY: "ci-unit-test-groq-key-placeholder"
      INTERNAL_SECRET: "ci-unit-test-internal-secret-placeholder"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"

      - name: Run unit tests
        run: |
          python -m pytest tests/ \
            -m "not integration" \
            -v \
            --tb=short \
            --no-header \
            -q

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Build both images and push to ECR.
  # Runs only after unit-tests passes.
  # Protected by the "production" environment — any configured
  # required reviewers or branch protection rules are enforced here.
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: unit-tests
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ── OIDC Authentication ──────────────────────────────────
      # Uses AWS's GitHub OIDC provider — no long-lived access keys stored
      # as secrets. The IAM role must trust the GitHub OIDC provider and
      # have the following ECR policy attached:
      #
      #   ecr:GetAuthorizationToken             (on *)
      #   ecr:BatchCheckLayerAvailability       (on the two ECR repos)
      #   ecr:GetDownloadUrlForLayer            (on the two ECR repos)
      #   ecr:BatchGetImage                     (on the two ECR repos)
      #   ecr:InitiateLayerUpload               (on the two ECR repos)
      #   ecr:UploadLayerPart                   (on the two ECR repos)
      #   ecr:CompleteLayerUpload               (on the two ECR repos)
      #   ecr:PutImage                          (on the two ECR repos)
      #
      # Store the role ARN as: Settings → Secrets → Actions → AWS_ROLE_ARN
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # Narrow the session to this specific workflow run for auditability.
          role-session-name: acp-ecr-push-${{ github.run_id }}

      # ── ECR Login ───────────────────────────────────────────
      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Docker Buildx ───────────────────────────────────────
      # Buildx enables BuildKit features: layer caching, multi-platform,
      # and --cache-from/--cache-to directives used below.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Compute immutable tag ────────────────────────────────
      - name: Compute short SHA tag
        id: tags
        run: |
          SHORT="${GITHUB_SHA::8}"
          echo "short_sha=${SHORT}" >> "$GITHUB_OUTPUT"
          echo "services_latest=${{ env.ECR_REGISTRY }}/acp-services:latest" >> "$GITHUB_OUTPUT"
          echo "services_sha=${{ env.ECR_REGISTRY }}/acp-services:sha-${SHORT}" >> "$GITHUB_OUTPUT"
          echo "ui_latest=${{ env.ECR_REGISTRY }}/acp-ui:latest" >> "$GITHUB_OUTPUT"
          echo "ui_sha=${{ env.ECR_REGISTRY }}/acp-ui:sha-${SHORT}" >> "$GITHUB_OUTPUT"

      # ── Build & Push: acp-services ───────────────────────────
      # Uses ECR as a layer cache backend so repeated builds only upload
      # changed layers. The builder stage (heavy pip install) is cached
      # independently via cache-from/cache-to with mode=max.
      - name: Build and push acp-services image
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          # Both :latest and the immutable SHA tag are pushed atomically.
          tags: |
            ${{ steps.tags.outputs.services_latest }}
            ${{ steps.tags.outputs.services_sha }}
          # Inline build labels for provenance — visible in ECR image detail.
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          # ECR layer cache: pull the previous build's layers before building,
          # then write the new layers back so the next run is fast.
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/acp-services:buildcache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/acp-services:buildcache,mode=max
          # Provenance and SBOM attestation — stored as ECR image index referrers.
          provenance: true
          sbom: true

      # ── Build & Push: acp-ui ─────────────────────────────────
      # The UI build takes VITE_GATEWAY_URL="" so the React app uses the
      # nginx proxy (relative URLs). Override at deployment time if needed.
      - name: Build and push acp-ui image
        uses: docker/build-push-action@v6
        with:
          context: ui
          dockerfile: ui/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.ui_latest }}
            ${{ steps.tags.outputs.ui_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/acp-ui:buildcache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/acp-ui:buildcache,mode=max
          build-args: |
            VITE_GATEWAY_URL=
          provenance: true
          sbom: true

      # ── Summary ─────────────────────────────────────────────
      # Write a job summary visible in the GitHub Actions UI so operators
      # can immediately copy the pushed image URIs.
      - name: Write job summary
        if: always()
        run: |
          SHORT="${{ steps.tags.outputs.short_sha }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ECR Push Summary

          | Image | Tag | URI |
          |-------|-----|-----|
          | acp-services | latest | \`${{ steps.tags.outputs.services_latest }}\` |
          | acp-services | sha-${SHORT} | \`${{ steps.tags.outputs.services_sha }}\` |
          | acp-ui | latest | \`${{ steps.tags.outputs.ui_latest }}\` |
          | acp-ui | sha-${SHORT} | \`${{ steps.tags.outputs.ui_sha }}\` |

          **Commit:** \`${{ github.sha }}\`
          **Triggered by:** ${{ github.actor }}
          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
