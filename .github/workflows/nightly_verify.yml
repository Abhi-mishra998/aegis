name: nightly-verify

# Sprint EI-4 (2026-06-20). Runs three independent verification suites
# every night at 04:13 UTC (1 hour after the soak finishes so the
# soak's audit rows are sealed into a Merkle root by the
# transparency_scheduler before we try to verify them):
#
#   1. AEVF V1-V6 — walks every daily root in the public S3 transparency
#      bucket and verifies ed25519 + prev_root_hash chain.
#   2. Cross-tenant isolation — runs reports/e2e_test_2026_06_20/
#      isolation_test.sh against staging.aegisagent.in; expects 7/7
#      attacks blocked.
#   3. Public probe — confirms /trust, /health, /.well-known/security.txt
#      return 200 from a clean GH Actions runner (no IP allowlist hits).
#
# Output: pushes a `verify.json` summary to
#   s3://aegis-public-roots-628478946931/nightly/<UTC-date>.json
# so any customer can `aws s3 cp --no-sign-request` and audit the run.
# Fails the workflow on any check failure → operator gets the email alarm.

on:
  schedule:
    - cron: "13 4 * * *"   # 1h after nightly_soak.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "ap-south-1"
  PUBLIC_ROOTS_BUCKET: "aegis-public-roots-628478946931"
  STAGING_GATEWAY_URL: "https://staging.aegisagent.in"

jobs:
  verify:
    name: AEVF + isolation + public probe
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install aegis-aevf (PyPI)
        run: pip install --upgrade pip 'aegis-aevf>=1.0.0'

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::628478946931:role/aegis-gha-nightly-soak
          aws-region: ${{ env.AWS_REGION }}

      # ── 1. AEVF V1-V6 over public S3 bucket ─────────────────────────
      - name: AEVF — V1-V6 over yesterday's root
        id: aevf
        run: |
          DATE_YESTERDAY="$(date -u -d 'yesterday' +%Y-%m-%d 2>/dev/null || date -u -v -1d +%Y-%m-%d)"
          mkdir -p /tmp/aevf
          # Pull yesterday's roots across every tenant partition that
          # published one. List, then verify each.
          aws s3 ls "s3://${PUBLIC_ROOTS_BUCKET}/roots/" --recursive \
            | awk -v d="$DATE_YESTERDAY" '$0 ~ d {print $4}' > /tmp/aevf/keys.txt
          rooted="$(wc -l < /tmp/aevf/keys.txt | tr -d ' ')"
          echo "Found $rooted root file(s) dated $DATE_YESTERDAY"
          if [ "$rooted" -eq 0 ]; then
            echo "No roots published for $DATE_YESTERDAY — non-fatal but logged."
            echo "aevf_status=no_roots" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          fail=0
          while read -r key; do
            aws s3 cp "s3://${PUBLIC_ROOTS_BUCKET}/$key" /tmp/aevf/root.json --quiet
            # The aegis-verify CLI ships as a console_script entry point
            # named `aegis-verify`. Walks the prev_root_hash chain from
            # this root back to genesis.
            if ! aegis-verify --bundle /tmp/aevf/root.json --bucket "$PUBLIC_ROOTS_BUCKET" \
                 > /tmp/aevf/last.txt 2>&1; then
              echo "✗ AEVF FAIL on $key"
              cat /tmp/aevf/last.txt
              fail=$((fail+1))
            else
              echo "✓ AEVF PASS on $key"
            fi
          done < /tmp/aevf/keys.txt
          if [ "$fail" -gt 0 ]; then
            echo "aevf_status=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "aevf_status=pass" >> "$GITHUB_OUTPUT"

      # ── 2. Cross-tenant isolation against staging ──────────────────
      - name: Isolation — 7-attack matrix against staging
        id: isolation
        run: |
          # The script in the repo points at prod by default; override the
          # BASE env to staging. Returns non-zero if any attack succeeds.
          export BASE="$STAGING_GATEWAY_URL"
          # sed-in-place to flip BASE without touching the file in git
          tmpf="$(mktemp)"
          sed "s|^BASE=.*|BASE=\"$STAGING_GATEWAY_URL\"|" \
            reports/e2e_test_2026_06_20/isolation_test.sh > "$tmpf"
          chmod +x "$tmpf"
          if bash "$tmpf" | tee /tmp/isolation.txt; then
            echo "isolation_status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "isolation_status=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      # ── 3. Public-surface probe ────────────────────────────────────
      - name: Public probe — /trust /health /.well-known/security.txt
        id: probe
        run: |
          fail=0
          for path in /health /trust /.well-known/security.txt; do
            url="${STAGING_GATEWAY_URL}${path}"
            code=$(curl -sS -o /dev/null -w '%{http_code}' "$url" || echo 000)
            if [ "$code" = "200" ]; then
              echo "✓ 200 $path"
            else
              echo "✗ $code $path"; fail=$((fail+1))
            fi
          done
          if [ "$fail" -gt 0 ]; then
            echo "probe_status=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "probe_status=pass" >> "$GITHUB_OUTPUT"

      # ── 4. SBOM CVE-watch (Sprint EI-13) ──────────────────────────
      # Pulls the latest CycloneDX SBOM that security_scan.yml generated
      # (uploaded as artifact `sbom-cyclonedx-<sha>`), runs trivy against
      # it, then diffs against yesterday's archived JSON. Fails the job
      # only on NEW high+critical CVEs since yesterday — chronic-unfixed
      # CVEs are listed but don't trigger an alert (otherwise the badge
      # is RED every night and the operator stops looking).
      - name: Install trivy
        run: |
          curl -fsSL https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Fetch latest SBOM from GH Actions artifacts
        id: sbom_fetch
        run: |
          mkdir -p /tmp/sbom-work
          # The security_scan workflow uploads sbom-cyclonedx-<sha>; pull
          # the most recent successful run on main.
          run_id="$(gh run list --workflow security_scan.yml \
                       --branch main --status success --limit 1 \
                       --json databaseId --jq '.[0].databaseId')"
          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "::warning::No successful security_scan run found — skipping CVE scan"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          gh run download "$run_id" \
            --dir /tmp/sbom-work \
            --pattern "sbom-cyclonedx-*" || true
          sbom="$(find /tmp/sbom-work -name 'sbom.cyclonedx.json' | head -1)"
          if [ -z "$sbom" ]; then
            echo "::warning::Downloaded artifact had no sbom.cyclonedx.json"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "sbom_path=$sbom" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan SBOM + container images + diff vs yesterday
        id: sbom_cve
        if: steps.sbom_fetch.outputs.skip == 'false'
        run: |
          SBOM="${{ steps.sbom_fetch.outputs.sbom_path }}"
          mkdir -p /tmp/cve
          # 1. Python SBOM (Sprint EI-13) — app-dep CVEs.
          bash scripts/ops/sbom_cve_scan.sh "$SBOM" /tmp/cve/sbom.json
          # 2. Pinned container images (Sprint EI-15) — OS-layer CVEs.
          #    Closes the gap between "what the Python SBOM sees" and
          #    "what actually runs in the container". Failures on
          #    individual images are tolerated (image_cve_scan.sh
          #    records placeholder findings so the diff sees them).
          bash scripts/ops/list_pinned_images.sh > /tmp/cve/images.txt
          echo "Pinned images to scan:"
          cat /tmp/cve/images.txt
          bash scripts/ops/image_cve_scan.sh /tmp/cve/images.txt /tmp/cve/images.json
          # 3. Union for the diff — sbom_cve_diff.py operates on the
          #    combined list. CveKey identity stays (id, package,
          #    version) so the same CVE in two sources is still ONE
          #    finding for diff purposes.
          jq -s '.[0] + .[1] | sort_by(.id, .source, .package, .installed_version)' \
            /tmp/cve/sbom.json /tmp/cve/images.json > /tmp/cve/today.json
          # 4. Diff vs yesterday's snapshot (404 = first run = empty baseline).
          aws s3 cp "s3://${PUBLIC_ROOTS_BUCKET}/cve-history/yesterday.json" \
            /tmp/cve/yesterday.json 2>/dev/null || true
          status="$(python3 scripts/ops/sbom_cve_diff.py \
            --today /tmp/cve/today.json \
            --yesterday /tmp/cve/yesterday.json \
            --out /tmp/cve/diff.json \
            --summary /tmp/cve/summary.md \
            --severity-floor HIGH || echo new-cves)"
          # Append the rendered summary to the GH step page regardless.
          cat /tmp/cve/summary.md >> "$GITHUB_STEP_SUMMARY"
          # Archive today's scan as YYYY-MM-DD + roll forward to yesterday's slot
          DATE_TODAY="$(date -u +%Y-%m-%d)"
          aws s3 cp /tmp/cve/today.json \
            "s3://${PUBLIC_ROOTS_BUCKET}/cve-history/${DATE_TODAY}.json" \
            --content-type application/json --cache-control "max-age=3600"
          aws s3 cp /tmp/cve/today.json \
            "s3://${PUBLIC_ROOTS_BUCKET}/cve-history/yesterday.json" \
            --content-type application/json --cache-control "max-age=300"
          echo "sbom_cve_status=$status" >> "$GITHUB_OUTPUT"
          # Fail the job only when net-new CVEs appeared
          if [ "$status" = "new-cves" ]; then exit 1; fi

      # ── Publish the summary for public audit ───────────────────────
      - name: Publish verify summary
        if: always()
        run: |
          DATE_TODAY="$(date -u +%Y-%m-%d)"
          NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > /tmp/verify.json <<EOF
          {
            "run_at_utc": "$NOW",
            "date":       "$DATE_TODAY",
            "aevf_v1_v6": "${{ steps.aevf.outputs.aevf_status || 'unknown' }}",
            "isolation":  "${{ steps.isolation.outputs.isolation_status || 'unknown' }}",
            "public_probe": "${{ steps.probe.outputs.probe_status || 'unknown' }}",
            "sbom_cve":   "${{ steps.sbom_cve.outputs.sbom_cve_status || 'skip' }}",
            "gh_run_id":  "${{ github.run_id }}",
            "gh_run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          jq . /tmp/verify.json
          aws s3 cp /tmp/verify.json \
            "s3://${PUBLIC_ROOTS_BUCKET}/nightly/${DATE_TODAY}.json" \
            --content-type application/json \
            --cache-control "max-age=3600"
          # Also overwrite a stable "latest" pointer so consumers don't
          # need to know yesterday's date to fetch the freshest run.
          aws s3 cp /tmp/verify.json \
            "s3://${PUBLIC_ROOTS_BUCKET}/nightly/latest.json" \
            --content-type application/json \
            --cache-control "max-age=300"

      # ── Sprint EI-14 — publish the static status-page mirror ──────
      # Single-file HTML, no JS framework — survives an Aegis ALB
      # outage because it lives in the same anonymously-readable bucket
      # as the data it consumes. CNAME from status.aegisagent.in
      # (operator-applied, see docs/runbooks/status_page_setup.md)
      # points at the bucket's website endpoint.
      - name: Publish static status-page mirror
        if: always()
        run: |
          if [ -f ui/public/status-mirror.html ]; then
            aws s3 cp ui/public/status-mirror.html \
              "s3://${PUBLIC_ROOTS_BUCKET}/status/index.html" \
              --content-type text/html \
              --cache-control "max-age=300"
          fi

      # ── Sprint EI-22 — publish the security-page mirror ──────────
      # Same outage-resistance pattern as the /status mirror: a security
      # researcher can still find the responsible-disclosure policy
      # and the email address even if the Aegis ALB is down.
      - name: Publish static security-page mirror
        if: always()
        run: |
          if [ -f ui/public/security-mirror.html ]; then
            aws s3 cp ui/public/security-mirror.html \
              "s3://${PUBLIC_ROOTS_BUCKET}/security/index.html" \
              --content-type text/html \
              --cache-control "max-age=300"
          fi

      # ── Sprint EI-14 — 30-day uptime rollup ───────────────────────
      # Pull every per-day verify.json from the public bucket for the
      # trailing 30 days, classify each as green / incident / no_data,
      # publish uptime/30day.json so /status (React + static mirror)
      # can render the rate. Runs AFTER the publish step so today's
      # JSON is already in the bucket.
      - name: Compute + publish 30-day uptime rollup
        if: always()
        run: |
          mkdir -p /tmp/nightly-archive
          aws s3 sync "s3://${PUBLIC_ROOTS_BUCKET}/nightly/" \
            /tmp/nightly-archive/ \
            --exclude "*" --include "*.json" \
            --exclude "latest.json"
          python3 scripts/ops/uptime_rollup.py \
            --input-dir /tmp/nightly-archive \
            --out /tmp/uptime-30day.json \
            --window-days 30
          aws s3 cp /tmp/uptime-30day.json \
            "s3://${PUBLIC_ROOTS_BUCKET}/uptime/30day.json" \
            --content-type application/json \
            --cache-control "max-age=600"

      - name: Render to step summary
        if: always()
        run: |
          {
            echo '### Nightly verify summary'
            echo
            echo "| Check | Status |"
            echo "|---|---|"
            echo "| AEVF V1-V6 | ${{ steps.aevf.outputs.aevf_status || 'unknown' }} |"
            echo "| Cross-tenant isolation (7/7) | ${{ steps.isolation.outputs.isolation_status || 'unknown' }} |"
            echo "| Public probe (/health /trust /.well-known/security.txt) | ${{ steps.probe.outputs.probe_status || 'unknown' }} |"
            echo "| SBOM CVE diff (HIGH+CRITICAL net-new since yesterday) | ${{ steps.sbom_cve.outputs.sbom_cve_status || 'skip' }} |"
            echo
            echo "Public artifact: s3://${PUBLIC_ROOTS_BUCKET}/nightly/$(date -u +%Y-%m-%d).json"
          } >> "$GITHUB_STEP_SUMMARY"
